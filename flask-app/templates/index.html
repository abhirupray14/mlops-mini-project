<!DOCTYPE html>

<html>
    <head>
        <title>Sentiment Analysis</title>

    </head>

    <body>
        <h1>Welcome to Sentiment Analysis App</h1>
        <form action = "/predict" method = "post">
            <label>Write Text:</label><br>
            <textarea name = "text" rows = "10" cols = "40"></textarea><br>
            <input type = "submit" value = "Predict Sentiment">
        </form>

        {% if result is not none %}
            {% if result == 1 %}
                <h2>Happy</h2>
            {% else %}
                <h2>Sad</h2>
            {% endif %}
        {% endif %}
    </body>

    </html>
